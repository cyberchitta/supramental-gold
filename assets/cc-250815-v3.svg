<svg viewBox="0 0 175 175" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        /* Color Palette (chosen when adapting the mark).
           The underlying symbol is from the Mother's Golden Day medallion (29 Feb 1960). The original design had no color. */
        --bronze: #cd5f2d;
        --gold: #d2aa32;
        --platinum: #E5E7EB;
        --pond-blue: #A3BFFA;
        --lotus-rose: #b43250;
        --pad-green: #1F7A25;

        /* Wheel elements */
        --wheel-rim-stroke: var(--bronze);
        --spoke-fill: var(--platinum);

        /* Pond/Square elements */
        --pond-square-fill: var(--pond-blue);
        --pond-border-stroke: var(--gold);

        /* Lotus background */
        --lotus-upper-background: var(--platinum);

        /* Lotus details */
        --lotus-petal-fill: var(--lotus-rose);
        --lotus-petal-stroke: var(--platinum);
        --waves-stroke: var(--platinum);

        /* Pad elements */
        --pad-fill: var(--pad-green);
        --pad-stroke: var(--platinum);
      }
    </style>

    <radialGradient id="ringGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--bronze)" />
      <stop offset="43.72%" stop-color="var(--bronze)" />
      <stop offset="62.48%" stop-color="var(--bronze)" />
      <stop offset="81.24%" stop-color="var(--gold)" />
      <stop offset="100%" stop-color="var(--gold)" />
    </radialGradient>
  </defs>

  <!-- Wheel circle with radial gradient -->
  <circle cx="87.5" cy="87.5" r="80" fill="url(#ringGradient)" stroke="none" />

  <!-- Wheel spokes (12 spokes, each 10° wide) -->
  <g>
    <!-- Spoke 1: 15° -->
    <path d="M 87.5 87.5 L 114.9 12.3 A 80 80 0 0 1 101.4 8.7 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 2: 45° -->
    <path d="M 87.5 87.5 L 148.8 36.1 A 80 80 0 0 1 138.9 26.2 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 3: 75° -->
    <path d="M 87.5 87.5 L 166.3 73.6 A 80 80 0 0 1 162.7 60.1 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 4: 105° -->
    <path d="M 87.5 87.5 L 162.7 114.9 A 80 80 0 0 1 166.3 101.4 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 5: 135° -->
    <path d="M 87.5 87.5 L 138.9 148.8 A 80 80 0 0 1 148.8 138.9 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 6: 165° -->
    <path d="M 87.5 87.5 L 101.4 166.3 A 80 80 0 0 1 114.9 162.7 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 7: 195° -->
    <path d="M 87.5 87.5 L 60.1 162.7 A 80 80 0 0 1 73.6 166.3 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 8: 225° -->
    <path d="M 87.5 87.5 L 26.2 138.9 A 80 80 0 0 1 36.1 148.8 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 9: 255° -->
    <path d="M 87.5 87.5 L 12.3 114.9 A 80 80 0 0 1 8.7 101.4 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 10: 285° -->
    <path d="M 87.5 87.5 L 12.3 60.1 A 80 80 0 0 1 8.7 73.6 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 11: 315° -->
    <path d="M 87.5 87.5 L 36.1 26.2 A 80 80 0 0 1 26.2 36.1 Z" fill="var(--spoke-fill)" />
    <!-- Spoke 12: 345° -->
    <path d="M 87.5 87.5 L 73.6 8.7 A 80 80 0 0 1 60.1 12.3 Z" fill="var(--spoke-fill)" />
  </g>

  <!-- Wheel rim -->
  <circle cx="87.5" cy="87.5" r="80" stroke="var(--wheel-rim-stroke)" stroke-width="3" fill="none" />

  <!-- Pond square -->
  <rect x="52.52" y="52.52" width="69.96" height="69.96" fill="var(--pond-square-fill)" />

  <!-- Central lotus design -->
  <g transform="translate(52.52, 52.52) scale(0.303)">
    <rect x="0" y="0" width="231" height="133.5" fill="var(--lotus-upper-background)" />
    <rect x="4" y="4" width="223" height="223" stroke="var(--pond-border-stroke)" stroke-width="8" fill="none" />

    <!-- Waves -->
    <line x1="8" y1="133.5" x2="223" y2="133.5" stroke="var(--waves-stroke)" stroke-width="2" />
    <line x1="8" y1="146.5" x2="223" y2="146.5" stroke="var(--waves-stroke)" stroke-width="2" />
    <line x1="8" y1="159.5" x2="223" y2="159.5" stroke="var(--waves-stroke)" stroke-width="2" />
    <line x1="8" y1="174.5" x2="223" y2="174.5" stroke="var(--waves-stroke)" stroke-width="2" />
    <line x1="8" y1="188.5" x2="223" y2="188.5" stroke="var(--waves-stroke)" stroke-width="2" />
    <line x1="8" y1="202.5" x2="223" y2="202.5" stroke="var(--waves-stroke)" stroke-width="2" />
    <line x1="8" y1="216.5" x2="223" y2="216.5" stroke="var(--waves-stroke)" stroke-width="2" />

